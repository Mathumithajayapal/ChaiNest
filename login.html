<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Chai Nest · Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/jpeg" href="images/favicon.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Theme Variables */
    :root {
      --bg-gradient-start: #0a0a0a;
      --bg-gradient-end: #1a1a1a;
      --card-bg: rgba(18, 18, 20, 0.9);
      --card-border: rgba(123, 75, 42, 0.2);
      --card-border-hover: rgba(123, 75, 42, 0.5);
      --text-primary: white;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --input-bg: rgba(30, 30, 35, 0.8);
      --input-border: rgba(123, 75, 42, 0.4);
      --input-focus-bg: rgba(40, 40, 45, 0.9);
      --placeholder-color: #6b7280;
      --divider-color: #4b5563;
      --divider-border: rgba(123, 75, 42, 0.25);
      --checkbox-text: #9ca3af;
      --register-text: #9ca3af;
      --shadow-color: rgba(0, 0, 0, 0.5);
      --body-before-gradient-1: rgba(123, 75, 42, 0.08);
      --body-before-gradient-2: rgba(123, 75, 42, 0.05);
      --success-bg: rgba(34, 197, 94, 0.15);
      --success-border: #22c55e;
      --success-text: #86efac;
      --social-btn-bg: rgba(255, 255, 255, 0.05);
      --social-btn-border: rgba(123, 75, 42, 0.3);
      --social-btn-hover: rgba(123, 75, 42, 0.2);
    }

    /* Light Mode */
    body.light-mode {
      --bg-gradient-start: #f5f7fa;
      --bg-gradient-end: #e8edf5;
      --card-bg: rgba(255, 255, 255, 0.95);
      --card-border: rgba(123, 75, 42, 0.25);
      --card-border-hover: rgba(123, 75, 42, 0.5);
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --input-bg: rgba(255, 255, 255, 0.9);
      --input-border: rgba(123, 75, 42, 0.3);
      --input-focus-bg: #ffffff;
      --placeholder-color: #94a3b8;
      --divider-color: #94a3b8;
      --divider-border: rgba(123, 75, 42, 0.2);
      --checkbox-text: #475569;
      --register-text: #64748b;
      --shadow-color: rgba(0, 0, 0, 0.1);
      --body-before-gradient-1: rgba(123, 75, 42, 0.05);
      --body-before-gradient-2: rgba(123, 75, 42, 0.03);
      --success-bg: rgba(34, 197, 94, 0.1);
      --success-text: #15803d;
      --social-btn-bg: rgba(0, 0, 0, 0.03);
      --social-btn-border: rgba(123, 75, 42, 0.2);
      --social-btn-hover: rgba(123, 75, 42, 0.1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.2s ease;
    }

    /* Animated background elements */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: radial-gradient(circle at 20% 40%, var(--body-before-gradient-1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, var(--body-before-gradient-2) 0%, transparent 60%);
      pointer-events: none;
      transition: background-image 0.3s ease;
    }

    /* Control Panel - Top Right Outside Container */
    .control-panel {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      padding: 0.5rem 0.8rem;
      border-radius: 3rem;
      border: 1px solid rgba(123, 75, 42, 0.3);
      transition: all 0.3s ease;
    }

    body.light-mode .control-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      border-color: rgba(123, 75, 42, 0.3);
    }

    body[dir="rtl"] .control-panel {
      right: auto;
      left: 1.5rem;
    }

    body[dir="rtl"] {
      direction: rtl;
    }

    /* Logo section - HORIZONTAL LAYOUT */
    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 1.8rem;
      text-align: center;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon {
      width: 55px;
      height: 55px;
      background: #7B4B2A;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 16px -6px rgba(123, 75, 42, 0.4);
      transition: transform 0.2s;
    }

    .logo-icon:hover {
      transform: scale(1.02);
    }

    .logo-icon svg {
      width: 32px;
      height: 32px;
      stroke: white;
      stroke-width: 1.5;
      fill: none;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      transition: color 0.2s ease;
      line-height: 1;
    }

    .logo-text span {
      color: #7B4B2A;
      position: relative;
    }

    .logo-text a {
      text-decoration: none;
      color: inherit;
    }

    body:not(.light-mode) .logo-text a {
      color: white;
    }

    .admin-badge {
      display: inline-block;
      background: rgba(123, 75, 42, 0.25);
      padding: 0.25rem 0.9rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 500;
      color: #c97e54;
      margin-top: 0.5rem;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
    }

    /* Welcome text */
    .welcome-text {
      text-align: center;
      margin-bottom: 2rem;
    }

    .welcome-text h2 {
      color: var(--text-primary);
      font-size: 1.65rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      transition: color 0.2s ease;
    }

    .welcome-text p {
      color: var(--text-secondary);
      font-size: 0.85rem;
      transition: color 0.2s ease;
    }

    /* Main Login Container */
    .login-container {
      width: 100%;
      max-width: 460px;
      z-index: 2;
      animation: fadeSlideUp 0.6s ease-out;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Card Design */
    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 45px -12px var(--shadow-color), 0 0 0 1px var(--card-border);
      border: 1px solid var(--card-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 50px -15px var(--shadow-color);
      border-color: var(--card-border-hover);
    }

    /* Form Styles */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      color: #7B4B2A;
      font-size: 1.1rem;
      pointer-events: none;
      z-index: 1;
    }

    .input-field {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 2.8rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 1.2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: all 0.25s ease;
      outline: none;
    }

    .input-field:focus {
      border-color: #7B4B2A;
      box-shadow: 0 0 0 3px rgba(123, 75, 42, 0.25);
      background: var(--input-focus-bg);
    }

    .input-field::placeholder {
      color: var(--placeholder-color);
      font-weight: 400;
    }

    /* Password toggle button */
    .password-toggle {
      position: absolute;
      right: 1rem;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
      z-index: 2;
    }

    .password-toggle:hover {
      color: #7B4B2A;
    }

    body[dir="rtl"] .password-toggle {
      right: auto;
      left: 1rem;
    }

    body[dir="rtl"] .input-icon {
      left: auto;
      right: 1rem;
    }

    body[dir="rtl"] .input-field {
      padding: 0.9rem 2.8rem 0.9rem 1rem;
      text-align: right;
    }

    /* Options row */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.8rem;
      font-size: 0.8rem;
    }

    body[dir="rtl"] .form-options {
      flex-direction: row;
      justify-content: space-between;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--checkbox-text);
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .checkbox-label input {
      accent-color: #7B4B2A;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .forgot-link {
      color: #7B4B2A;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: #b97f55;
      text-decoration: underline;
    }

    /* Sign In Button - Centered */
    .sign-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .sign-btn {
      background: linear-gradient(135deg, #7B4B2A, #c97e5a);
      color: #fff;
      border: none;
      padding: 0.9rem 2.5rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(123, 75, 42, 0.25);
      text-align: center;
      min-width: 160px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-family: 'Inter', sans-serif;
    }

    .sign-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(123, 75, 42, 0.35);
      background: linear-gradient(135deg, #8b5a38, #d48e68);
    }

    .sign-btn:active {
      transform: scale(0.97);
    }

    .sign-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Social Login Options */
    .social-login {
      margin-top: 1rem;
    }

    .social-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 0.8rem;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.75rem;
      background: var(--social-btn-bg);
      border: 1px solid var(--social-btn-border);
      border-radius: 1rem;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .social-btn:hover {
      background: var(--social-btn-hover);
      border-color: #7B4B2A;
      transform: translateY(-2px);
    }

    .social-btn i {
      font-size: 1.1rem;
      color: #7B4B2A;
    }

    /* Success/Error messages */
    .success-message {
      background: var(--success-bg);
      border-left: 3px solid var(--success-border);
      color: var(--success-text);
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      font-size: 0.8rem;
      margin-bottom: 1.2rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    .success-message.show {
      display: flex;
    }

    .error-message {
      background: rgba(220, 38, 38, 0.15);
      border-left: 3px solid #dc2626;
      color: #fecaca;
      padding: 0.7rem 1rem;
      border-radius: 0.8rem;
      font-size: 0.8rem;
      margin-bottom: 1.2rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

    body.light-mode .error-message {
      color: #991b1b;
    }

    .error-message.show {
      display: flex;
    }

    body[dir="rtl"] .error-message,
    body[dir="rtl"] .success-message {
      border-left: none;
      border-right: 3px solid;
    }

    body[dir="rtl"] .error-message {
      border-right-color: #dc2626;
    }

    body[dir="rtl"] .success-message {
      border-right-color: var(--success-border);
    }

    /* Loading spinner animation */
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .fa-spinner {
      animation: spin 1s linear infinite;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: var(--divider-color);
      font-size: 0.75rem;
      margin: 1.5rem 0;
      transition: color 0.2s ease;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--divider-border);
      transition: border-color 0.2s ease;
    }

    .divider span {
      margin: 0 0.8rem;
    }

    /* Footer / extra links */
    .register-link {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.8rem;
      color: var(--register-text);
      transition: color 0.2s ease;
    }

    .register-link a {
      color: #7B4B2A;
      text-decoration: none;
      font-weight: 600;
    }

    .register-link a:hover {
      text-decoration: underline;
    }

    /* Icon button styles */
    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid #b07a4f;
      background: transparent;
      color: #b07a4f;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .text-btn {
      font-size: 14px;
      font-weight: 600;
      width: auto;
      border-radius: 40px;
      padding: 0 16px;
    }

    .icon-btn:hover {
      background: #b07a4f;
      color: #fff;
    }

    body.light-mode .icon-btn {
      border-color: #b07a4f;
      color: #b07a4f;
    }

    body.light-mode .icon-btn:hover {
      background: #b07a4f;
      color: #fff;
    }

    /* Responsive */
    @media (max-width: 500px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
      .logo-text {
        font-size: 1.5rem;
      }
      .logo-icon {
        width: 45px;
        height: 45px;
      }
      .logo-icon svg {
        width: 26px;
        height: 26px;
      }
      .control-panel {
        top: 1rem;
        right: 1rem;
        padding: 0.4rem 0.6rem;
      }
      body[dir="rtl"] .control-panel {
        right: auto;
        left: 1rem;
      }
      .icon-btn {
        width: 36px;
        height: 36px;
        font-size: 1rem;
      }
      .text-btn {
        padding: 0 12px;
        font-size: 12px;
      }
      .sign-btn {
        padding: 0.8rem 2rem;
        min-width: 140px;
        font-size: 0.9rem;
      }
      .social-buttons {
        flex-direction: column;
        gap: 0.75rem;
      }
      .social-btn {
        padding: 0.65rem;
      }
    }
    @media (max-width: 360px) {

  body {
    padding: 1rem;
  }

  .login-card {
    padding: 1.6rem 1.2rem;
    border-radius: 1.5rem;
  }

  .logo-section {
    gap: 8px;
    margin-bottom: 1.2rem;
  }

  .logo-text {
    font-size: 1.3rem;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
  }

  .logo-icon svg {
    width: 22px;
    height: 22px;
  }

  .welcome-text h2 {
    font-size: 1.3rem;
  }

  .welcome-text p {
    font-size: 0.75rem;
  }

  .input-field {
    padding: 0.75rem 0.9rem 0.75rem 2.4rem;
    font-size: 0.85rem;
  }

  .input-icon {
    font-size: 0.95rem;
    left: 0.8rem;
  }

  .password-toggle {
    right: 0.8rem;
    font-size: 1rem;
  }

  .form-options {
    font-size: 0.7rem;
    margin-bottom: 1.2rem;
  }

  .sign-btn {
    width: 100%;
    min-width: unset;
    padding: 0.75rem;
    font-size: 0.9rem;
  }

  .social-buttons {
    flex-direction: column;
    gap: 0.6rem;
  }

  .social-btn {
    font-size: 0.8rem;
    padding: 0.6rem;
  }

  .divider {
    font-size: 0.7rem;
    margin: 1.2rem 0;
  }

  .register-link {
    font-size: 0.7rem;
    margin-top: 1.2rem;
  }

  /* 🔥 FIX CONTROL PANEL */
  .control-panel {
    top: 0.6rem;
    right: 0.6rem;
    padding: 0.3rem 0.5rem;
    gap: 0.4rem;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    font-size: 0.85rem;
  }

  .text-btn {
    font-size: 11px;
    padding: 0 8px;
  }
}
  </style>
</head>
<body>

  <!-- Control Panel - Top Right Outside Container -->
  <div class="control-panel">
    <button class="icon-btn" id="darkModeToggleBtn">🌙</button>
    <button class="icon-btn text-btn" id="rtlToggleBtn">LTR</button>
  </div>

<div class="login-container">
  <div class="login-card">
    
    <!-- Logo & Branding - HORIZONTAL LAYOUT -->
    <div class="logo-section">
      <div class="logo-wrapper">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
      </div>
      <div class="logo-text">
        <a href="index.html">Chai<span>Nest</span></a>
      </div>
    </div>
    
    <div style="text-align: center;">
      <div class="admin-badge">
        <i class="fas fa-shield-alt" style="font-size: 0.65rem;"></i> Admin Portal
      </div>
    </div>

    <!-- Welcome message -->
    <div class="welcome-text">
      <h2>Welcome back</h2>
      <p>Sign in to manage your tea empire</p>
    </div>

    <!-- Success notification -->
    <div id="successBox" class="success-message">
      <i class="fas fa-check-circle"></i>
      <span id="successText">Login successful! Welcome back, Admin.</span>
    </div>

    <!-- Error notification -->
    <div id="errorBox" class="error-message">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Invalid credentials. Please try again.</span>
    </div>

    <!-- Login Form -->
    <form id="loginForm" action="#" method="post">
      <div class="form-group">
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="emailInput" class="input-field" placeholder="Admin email address" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <div class="input-group">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="passwordInput" class="input-field" placeholder="Password" autocomplete="current-password">
          <button type="button" class="password-toggle" id="togglePassword">
            <i class="fas fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-label">
          <input type="checkbox" id="rememberCheckbox"> <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" id="forgotPasswordLink">Forgot password?</a>
      </div>

      <!-- Centered Sign In Button -->
      <div class="sign-btn-wrapper">
        <button type="submit" class="sign-btn" id="signInBtn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
      </div>
    </form>

    <!-- Additional Sign-in Options -->
    <div class="social-login">
      <div class="divider">
        <span>Or continue with</span>
      </div>
      <div class="social-buttons">
        <button class="social-btn" id="googleLogin">
          <i class="fab fa-google"></i> Google
        </button>
        <button class="social-btn" id="microsoftLogin">
          <i class="fab fa-microsoft"></i> Microsoft
        </button>
      </div>
    </div>

    <div class="register-link">
      Don't have an account? <a href="signup.html" id="createAccountLink">Create an account</a>
    </div>
  </div>
</div>

<script>
  // Hardcoded authentication for demo
  const VALID_EMAIL = "admin@chainest.com";
  const VALID_PASSWORD = "admin123";

  // DOM elements
  const loginForm = document.getElementById('loginForm');
  const emailInput = document.getElementById('emailInput');
  const passwordInput = document.getElementById('passwordInput');
  const errorBox = document.getElementById('errorBox');
  const errorTextSpan = document.getElementById('errorText');
  const successBox = document.getElementById('successBox');
  const successTextSpan = document.getElementById('successText');
  const rememberCheckbox = document.getElementById('rememberCheckbox');
  const forgotLink = document.getElementById('forgotPasswordLink');
  const signInBtn = document.getElementById('signInBtn');
  const darkModeToggleBtn = document.getElementById('darkModeToggleBtn');
  const rtlToggleBtn = document.getElementById('rtlToggleBtn');
  const togglePasswordBtn = document.getElementById('togglePassword');

  // Password visibility toggle
  if (togglePasswordBtn) {
    togglePasswordBtn.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      const icon = togglePasswordBtn.querySelector('i');
      icon.classList.toggle('fa-eye');
      icon.classList.toggle('fa-eye-slash');
    });
  }

  // Helper to hide all notification boxes
  function hideAllNotifications() {
    errorBox.classList.remove('show');
    successBox.classList.remove('show');
  }

  // Helper to show error message
  function showError(message) {
    hideAllNotifications();
    errorTextSpan.innerText = message;
    errorBox.classList.add('show');
    setTimeout(() => {
      errorBox.classList.remove('show');
    }, 4000);
  }

  // Helper to show success message
  function showSuccess(message) {
    hideAllNotifications();
    successTextSpan.innerText = message;
    successBox.classList.add('show');
    setTimeout(() => {
      successBox.classList.remove('show');
    }, 4000);
  }

  // Handle successful login
  function handleSuccessfulLogin() {
    if (rememberCheckbox.checked) {
      localStorage.setItem('chaiNest_remembered', 'true');
      localStorage.setItem('chaiNest_email', emailInput.value.trim());
    } else {
      localStorage.removeItem('chaiNest_remembered');
      localStorage.removeItem('chaiNest_email');
    }
    
    // Show success message with animation effect on button
    const originalBtnHTML = signInBtn.innerHTML;
    signInBtn.innerHTML = '<i class="fas fa-check-circle"></i> Welcome!';
    signInBtn.style.background = 'linear-gradient(135deg, #22c55e, #15803d)';
    
    setTimeout(() => {
      signInBtn.innerHTML = originalBtnHTML;
      signInBtn.style.background = '';
    }, 2000);
    
    showSuccess('✨ Login successful! Welcome back, Admin. You are now signed in. ✨');
  }

  // Login submission handler
  loginForm.addEventListener('submit', function(e) {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    
    if (!email || !password) {
      showError('Please enter both email and password.');
      return;
    }
    
    if (email === VALID_EMAIL && password === VALID_PASSWORD) {
      handleSuccessfulLogin();
    } else {
      showError('Incorrect email or password.');
      // Shake animation effect on error
      const card = document.querySelector('.login-card');
      card.style.transform = 'translateX(4px)';
      setTimeout(() => { card.style.transform = ''; }, 100);
      setTimeout(() => { card.style.transform = 'translateX(-4px)'; }, 150);
      setTimeout(() => { card.style.transform = ''; }, 250);
    }
  });
  
  // Forgot password
  forgotLink.addEventListener('click', function(e) {
    e.preventDefault();
    alert('🔐 Password reset link will be sent to your registered email address.');
  });
  
  // Social login handlers
  const googleBtn = document.getElementById('googleLogin');
  const microsoftBtn = document.getElementById('microsoftLogin');
  
  if (googleBtn) {
    googleBtn.addEventListener('click', function() {
      alert('🔐 Google Sign-In is available for authorized users only. Please use email login for demo.');
    });
  }
  
  if (microsoftBtn) {
    microsoftBtn.addEventListener('click', function() {
      alert('🔐 Microsoft Sign-In is available for authorized users only. Please use email login for demo.');
    });
  }
  
  // ==================== DARK MODE FUNCTIONALITY ====================
  function initDarkMode() {
    const savedMode = localStorage.getItem('chaiNest_darkMode');
    if (savedMode === 'light') {
      document.body.classList.add('light-mode');
      if (darkModeToggleBtn) darkModeToggleBtn.innerHTML = '☀️';
    } else {
      document.body.classList.remove('light-mode');
      if (darkModeToggleBtn) darkModeToggleBtn.innerHTML = '🌙';
      if (!savedMode) localStorage.setItem('chaiNest_darkMode', 'dark');
    }
  }
  
  function toggleDarkMode() {
    if (document.body.classList.contains('light-mode')) {
      document.body.classList.remove('light-mode');
      localStorage.setItem('chaiNest_darkMode', 'dark');
      if (darkModeToggleBtn) darkModeToggleBtn.innerHTML = '🌙';
    } else {
      document.body.classList.add('light-mode');
      localStorage.setItem('chaiNest_darkMode', 'light');
      if (darkModeToggleBtn) darkModeToggleBtn.innerHTML = '☀️';
    }
  }
  
  // ==================== RTL FUNCTIONALITY ====================
  function initRTL() {
    const savedDir = localStorage.getItem('chaiNest_dir');
    if (savedDir === 'rtl') {
      document.body.setAttribute('dir', 'rtl');
      if (rtlToggleBtn) rtlToggleBtn.innerHTML = 'RTL';
    } else {
      document.body.setAttribute('dir', 'ltr');
      if (rtlToggleBtn) rtlToggleBtn.innerHTML = 'LTR';
    }
  }
  
  function toggleRTL() {
    if (document.body.getAttribute('dir') === 'rtl') {
      document.body.setAttribute('dir', 'ltr');
      localStorage.setItem('chaiNest_dir', 'ltr');
      if (rtlToggleBtn) rtlToggleBtn.innerHTML = 'LTR';
    } else {
      document.body.setAttribute('dir', 'rtl');
      localStorage.setItem('chaiNest_dir', 'rtl');
      if (rtlToggleBtn) rtlToggleBtn.innerHTML = 'RTL';
    }
  }
  
  // Add event listeners for toggle buttons
  if (darkModeToggleBtn) darkModeToggleBtn.addEventListener('click', toggleDarkMode);
  if (rtlToggleBtn) rtlToggleBtn.addEventListener('click', toggleRTL);
  
  // Prefill from localStorage if "remember me" was previously set
  window.addEventListener('DOMContentLoaded', function() {
    initDarkMode();
    initRTL();
    
    const remembered = localStorage.getItem('chaiNest_remembered');
    if (remembered === 'true') {
      const savedEmail = localStorage.getItem('chaiNest_email');
      if (savedEmail) {
        emailInput.value = savedEmail;
        rememberCheckbox.checked = true;
      }
    }
    
    // Focus effects
    const inputs = document.querySelectorAll('.input-field');
    inputs.forEach(input => {
      input.addEventListener('focus', () => {
        input.parentElement.style.transform = 'scale(1.01)';
      });
      input.addEventListener('blur', () => {
        input.parentElement.style.transform = '';
      });
    });
  });
  
  // Logo hover effect
  const logoIcon = document.querySelector('.logo-icon');
  if (logoIcon) {
    logoIcon.addEventListener('mouseenter', () => {
      logoIcon.style.transform = 'rotate(2deg) scale(1.02)';
    });
    logoIcon.addEventListener('mouseleave', () => {
      logoIcon.style.transform = '';
    });
  }
</script>
</body>
</html>
